map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # All API + VNC traffic goes through here. The VNC console uses
    # WebSockets, so we forward Upgrade/Connection headers and use
    # HTTP/1.1 — without this, the noVNC console would 502 in Docker.
    # We hit 127.0.0.1:8080 because both containers run on the host's
    # network namespace (network_mode: host in docker-compose.yml) —
    # "backend" hostname isn't resolvable from host network.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Long-lived WebSocket connections (VNC) need generous timeouts.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
