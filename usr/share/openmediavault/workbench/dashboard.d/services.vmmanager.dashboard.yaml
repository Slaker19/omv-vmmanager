version: "1.0"
type: dashboard-widget
data:
  id: b2c3d4e5-6f7a-4b8c-9d0e-1f2a3b4c5d6e
  permissions:
    role:
      - admin
      - user
  title: _("Virtual Machines")
  type: datatable
  reloadPeriod: 30000
  datatable:
    columns:
      - name: _("Name")
        prop: name
        flexGrow: 1
      - name: _("State")
        prop: state
        cellTemplateName: iconWithText
        flexGrow: 1
      - name: _("vCPUs")
        prop: vcpu
        flexGrow: 1
      - name: _("RAM MB")
        prop: memory
        flexGrow: 1
    store:
      proxy:
        service: VmManager
        get:
          method: listVms
