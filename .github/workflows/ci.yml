name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight run for the same branch+PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  GHCR_ORG: omv-vmmanager

jobs:
  # ---------------------------------------------------------------
  # 1. Backend lint + test (Go)
  # ---------------------------------------------------------------
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      # libvirt headers aren't installed by default in GitHub Actions
      # runners. The packages that import github.com/libvirt/libvirt-go
      # only need the C headers at build time when CGO is enabled.
      - name: Install libvirt dev headers
        run: sudo apt-get update && sudo apt-get install -y libvirt-dev pkg-config

      - name: Create embed dist directory
        run: mkdir -p internal/frontend/dist && touch internal/frontend/dist/.gitkeep

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend
          args: --timeout=5m ./...

      - name: go test (with race detector + coverage)
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  # ---------------------------------------------------------------
  # 2. Frontend lint + test (TypeScript/Svelte)
  # ---------------------------------------------------------------
  frontend:
    name: Frontend (lint + format + build)
    runs-on: ubuntu-latest
    defaults:
        run:
          working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check .

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ---------------------------------------------------------------
  # 3. Container images (only on main, after lint+test pass)
  # ---------------------------------------------------------------
  docker:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.GHCR_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ env.GHCR_TOKEN != '' }}
          tags: |
            ghcr.io/${{ env.GHCR_ORG }}/omv-vmmanager-backend:latest
            ghcr.io/${{ env.GHCR_ORG }}/omv-vmmanager-backend:${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_name }}@${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: ${{ env.GHCR_TOKEN != '' }}
          tags: |
            ghcr.io/${{ env.GHCR_ORG }}/omv-vmmanager-frontend:latest
            ghcr.io/${{ env.GHCR_ORG }}/omv-vmmanager-frontend:${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_name }}@${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose
        run: |
          DOCKER_BUILDKIT=0 docker compose config --quiet

  # ---------------------------------------------------------------
  # 4. OMV 8 .deb build (on phase-2/omv-plugin-8 branch)
  # ---------------------------------------------------------------
  deb-omv8:
    name: OMV 8 .deb (Debian 13 trixie)
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/phase-2/omv-plugin-8'
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential debhelper \
            devscripts golang-go nodejs npm \
            libvirt-dev pkg-config python3

      - name: Build .deb
        run: make deb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: openmediavault-vmmanager-deb-trixie
          path: ../openmediavault-vmmanager_*.deb
